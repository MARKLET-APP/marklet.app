kind = "api"
  previewPath = "/api"
  title = "API Server"
  version = "1.0.0"
  id = "3B4_FFSkEVBkAeYMFRJ2e"

  [[services]]
  localPort = 8080
  name = "API Server"
  paths = ["/", "/api"]

  [services.development]
  run = "pnpm --filter @workspace/api-server run dev"

  [services.env]
  PORT = "8080"

  [services.production]
  build = ["sh", "-c", "pnpm --filter @workspace/syrian-car-market run build && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/db run seed-admin"]
  run = ["sh", "-c", "NODE_ENV=production PORT=8080 node artifacts/api-server/dist/index.cjs"]

  [services.production.health.startup]
  path = "/api/healthz"
