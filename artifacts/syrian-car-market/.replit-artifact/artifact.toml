kind = "web"
    previewPath = "/"
    title = "Syrian Car Market"
    version = "1.0.0"
    id = "artifacts/syrian-car-market"
    router = "path"

    [[integratedSkills]]
    name = "react-vite"
    version = "1.0.0"

    [[services]]
    localPort = 20307
    name = "web"
    paths = ["/"]

    [services.development]
    run = "pnpm --filter @workspace/syrian-car-market run dev"

    [services.env]
    PORT = "20307"
    BASE_PATH = "/"

    [services.production]
    build = ["pnpm", "--filter", "@workspace/syrian-car-market", "run", "build"]
    run = ["sh", "-c", "pnpm exec serve --single dist/public --listen tcp://0.0.0.0:${PORT:-20307}"]
  