services:
  - type: web
    name: marklet-api
    env: node
    plan: free
    region: frankfurt
    buildCommand: "pnpm install && pnpm --filter @workspace/api-server run build"
    startCommand: "node artifacts/api-server/dist/index.cjs"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FCM_SERVER_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
