services:
  - type: web
    name: marklet-api
    env: node
    plan: free
    region: frankfurt
    buildCommand: >-
      pnpm install &&
      pnpm --filter @workspace/syrian-car-market run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push
    startCommand: "pnpm --filter @workspace/db run push-force; node artifacts/api-server/dist/index.cjs"
    healthCheckPath: /api/healthz
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FCM_SERVER_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      # GCS Object Storage — leave blank on Render (uses disk fallback automatically)
      # Set PRIVATE_OBJECT_DIR only when deploying on Replit with Object Storage provisioned
      - key: PRIVATE_OBJECT_DIR
        value: ""
      - key: DEFAULT_OBJECT_STORAGE_BUCKET_ID
        value: ""
